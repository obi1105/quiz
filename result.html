<!DOCTYPE html>
<html lang="ja">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>フロントエンドクイズ</title>
        <link rel="stylesheet" href="quiz.css">
    </head>
    <body>
        <header>
            <div class="logo">
                <img src="logo.png" alt="ロゴ">
            </div>
        </header>
        <main>
            <article>
                <section id="quiz" class="result-container">
                    <h1>クイズ終了🎉</h1>
                    <p class="score-text">あなたのスコアは</p>
                    <p id="score" class="score">3/5</p>
                    <p class="message" id="message">よくできました</p>
                    <button type="button" id="restartBtn">もう一度挑戦する</button>
                </section>
            </article>
        </main>
        <script src="result.js"></script>
    </body>
</html>
